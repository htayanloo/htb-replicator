name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set binary name
        id: name
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          GOARM="${{ matrix.goarm }}"
          ARCH="${{ matrix.goarch }}"
          [ -n "$GOARM" ] && ARCH="armv${GOARM}"
          echo "binary=htb-replicator-${{ matrix.goos }}-${ARCH}${EXT}" >> "$GITHUB_OUTPUT"

      - name: Vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w \
              -X main.Version=${{ github.ref_name }} \
              -X main.Commit=${{ github.sha }} \
              -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -trimpath \
            -o "${{ steps.name.outputs.binary }}" \
            ./cmd/replicator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.binary }}
          path: ${{ steps.name.outputs.binary }}
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Copy install script
        run: cp deploy/install.sh dist/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
